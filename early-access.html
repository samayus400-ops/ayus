<script>
  async function fetchClubData() {
    const clubSlug = 'anime-lovers-chess-club-1';
    const countEl = document.getElementById('memberCount');

    try {
      const response = await fetch(`https://api.chess.com/pub/club/${clubSlug}`);
      const data = await response.json();

      if (data.members_count) {
        countEl.innerText = data.members_count.toLocaleString();
      }
    } catch (e) {
      countEl.innerText = "!";
      console.error("API Fetch Failed");
    }
  }
  fetchClubData();
</script>
