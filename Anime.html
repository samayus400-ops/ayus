<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Birthday List</title>
</head>
<body>
    <h1>Welcome to the Birthday List</h1>
    <div id="birthday-container">
        <!-- Birthday list will be populated here -->
    </div>
    <div id="no-birthdays-message" style="display: none;">
        <p>No birthdays registered yet. Please add a birthday.</p>
    </div>
    <form id="birthday-form">
        <label for="name">Name:</label>
        <input type="text" id="name" required>
        <label for="date">Birthday:</label>
        <input type="date" id="date" required>
        <button type="submit">Add Birthday</button>
    </form>
    <script>
        const birthdays = [];

        const birthdayForm = document.getElementById('birthday-form');
        const birthdayContainer = document.getElementById('birthday-container');
        const noBirthdaysMessage = document.getElementById('no-birthdays-message');

        birthdayForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const date = document.getElementById('date').value;
            if (name && date) {
                birthdays.push({ name, date });
                document.getElementById('name').value = '';
                document.getElementById('date').value = '';
                renderBirthdays();
            }
        });

        function renderBirthdays() {
            birthdayContainer.innerHTML = ''; // Clear previous entries
            if (birthdays.length === 0) {
                noBirthdaysMessage.style.display = 'block';
            } else {
                noBirthdaysMessage.style.display = 'none';
                birthdays.forEach(birthday => {
                    const birthdayItem = document.createElement('div');
                    birthdayItem.innerText = `${birthday.name} - ${birthday.date}`;
                    birthdayContainer.appendChild(birthdayItem);
                });
            }
        }
    </script>
</body>
</html>
